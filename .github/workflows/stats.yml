name: Generate GitHub Stats

on:
  schedule:
    - cron: "0 0 * * *" # Runs automatically every 24 hours
  workflow_dispatch: # Allows you to run it manually whenever you want

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Generate GitHub Stats
        uses: stats-organization/github-readme-stats-action@main
        with:
          token: ${{ secrets.PAT_1 }}
          # The action will output the SVG files into your repository
      
      - name: Commit and Push SVGs
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Auto-update GitHub stats SVGs" || exit 0
          git push
