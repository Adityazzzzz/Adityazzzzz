name: Generate GitHub Stats

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Generate Main Stats Card
        uses: stats-organization/github-readme-stats-action@main
        with:
          token: ${{ secrets.PAT_1 }}
          card: "stats"
          # Passing all styles in a single query string forces the action to use them
          options: "theme=react&bg_color=151515&show_icons=true&hide_border=true"

      - name: Generate Top Languages Card
        uses: stats-organization/github-readme-stats-action@main
        with:
          token: ${{ secrets.PAT_1 }}
          card: "top-langs"
          # Removed layout=compact to match your friend's dotted list style
          options: "theme=react&bg_color=151515&hide_border=true"
      
      - name: Commit and Push SVGs
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Auto-update GitHub stats SVGs" || exit 0
          git push
